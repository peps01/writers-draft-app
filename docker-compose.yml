services:
  db:
    image: postgres:16
    container_name: wda_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: writers_draft_app
      POSTGRES_USER: wda_user
      POSTGRES_PASSWORD: wda_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wda_user -d writers_draft_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: wda_backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: wda_frontend
    restart: unless-stopped
    command: npx quasar dev -p 9000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "9000:9000"
    depends_on:
      - backend

volumes:
  postgres_data:
